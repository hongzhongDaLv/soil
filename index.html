<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>土样管理系统 v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--sf:#fff;--sf2:#f7f8fa;--bd:#d4d8e0;--acc:#2a6ab0;--grn:#1a8a4a;--red:#c03030;--txt:#1a1e2c;--mt:#8890a0;--shelf:#b8bcc6;--shd:#9a9eaa;--hit:#ff6b35;--sel:#2a6ab0}
html,body{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:'Microsoft YaHei','微软雅黑','PingFang SC',sans-serif;font-size:15px;-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#c0c4cc;border-radius:3px}
@keyframes glow{0%,100%{box-shadow:0 0 0 2px var(--sel)}50%{box-shadow:0 0 8px 3px #2a6ab066}}
@keyframes hit{0%,100%{box-shadow:0 0 0 2px var(--hit)}50%{box-shadow:0 0 8px 3px #ff6b3566}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;gap:10px;padding:7px 16px;background:var(--sf);border-bottom:2px solid var(--bd);box-shadow:0 1px 3px #0001}
.hdr-t{font-size:20px;font-weight:bold;color:var(--acc)}
.hdr-b{font-size:10px;background:#e8f0f8;color:var(--acc);padding:1px 8px;border:1px solid #c0d4e8;border-radius:10px}
.hdr-r{margin-left:auto;display:flex;gap:6px}
.sbar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.sbar-w{flex:1;min-width:200px}
#si{width:100%;padding:7px 12px;background:var(--sf2);border:2px solid var(--bd);color:var(--txt);font-size:15px;outline:none;border-radius:8px;box-shadow:inset 0 1px 3px #0001}
#si:focus{border-color:var(--acc)}#si::placeholder{color:#b0b8c4}
.fsel{padding:5px 8px;background:var(--sf2);border:2px solid var(--bd);color:var(--txt);font-size:13px;border-radius:6px;box-shadow:0 1px 3px #0001}
.scnt{font-size:13px;color:var(--mt);white-space:nowrap}
.main{display:flex;flex:1;overflow:hidden}
.sa{flex:1;overflow:auto;padding:10px 14px;display:flex;flex-direction:column;align-items:center}
.st{font-size:16px;font-weight:bold;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.st-n{font-size:13px;color:var(--mt);font-weight:normal}
.sf{background:var(--sf2);border:2px solid var(--shelf);padding:2px 6px;display:inline-block;min-width:500px;border-radius:6px;box-shadow:0 2px 8px #0001}
.sf-side{position:absolute;top:0;bottom:0;width:6px;background:linear-gradient(90deg,var(--shd),var(--shelf),var(--shd))}
.lv{padding:4px 10px 6px;position:relative}
.lv-l{font-size:12px;color:var(--mt);margin-bottom:3px;font-weight:bold}
.lv-c{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-end}
.sb{height:4px;background:linear-gradient(90deg,var(--shd),var(--shelf),#ccd0d8,var(--shelf),var(--shd));margin:0 -6px;box-shadow:0 1px 2px #0001}
.sl{display:flex;justify-content:space-between;padding:0 12px;margin-top:1px}
.sleg{width:6px;height:12px;background:var(--shd)}

/* Container base */
.ct{position:relative;cursor:grab;transition:transform .1s;flex-shrink:0;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.ct:hover{transform:translateY(-2px);z-index:5}
.ct.sel{animation:glow 1.2s infinite;z-index:10}
.ct.srhit{animation:hit .8s infinite;z-index:8}
.ct.dim,.stkg.dim{opacity:.18;filter:grayscale(.6)}
.ct-b{width:100%;position:relative;overflow:visible}
.ct-lb{font-size:11px;color:#444;text-align:center;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3;font-weight:500;background:rgba(255,255,255,.92);border-radius:4px;padding:1px 4px;position:relative;z-index:5;box-shadow:0 1px 2px #0001}
.ct-sti{position:absolute;top:2px;right:2px;width:7px;height:7px;border:1px solid #fff8;border-radius:50%}
.ct-sti.s在库{background:#2a9a4a}.ct-sti.s已取出{background:#c0a020}.ct-sti.s已用完{background:#c04040}.ct-sti.s待处理{background:#3070b0}

/* Stack */
.stkg{display:inline-flex;flex-direction:column;align-items:center;flex-shrink:0}
.stkg .ct-top{margin-bottom:-10px;z-index:3}
.stkg .ct-bot{z-index:1}
.stk-badge{position:absolute;top:-1px;left:-1px;background:var(--acc);color:#fff;font-size:9px;font-weight:bold;padding:0 4px;line-height:14px;z-index:4;border-radius:0 0 4px 0}

/* ===== WOVEN BAG — v3 grid texture + trapezoid ===== */
.ct-b.woven_bag{
  border:2px solid var(--cd);
  background:var(--cm);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 5px,var(--cd) 5px,var(--cd) 6px),
    repeating-linear-gradient(90deg,transparent,transparent 5px,var(--cd) 5px,var(--cd) 6px);
  clip-path:polygon(8% 0,92% 0,100% 100%,0 100%);
}
.bag-tie{position:absolute;top:-9px;left:50%;transform:translateX(-50%);z-index:4}
.bag-rope{width:14px;height:3px;background:var(--cd);margin:0 auto}
.bag-knot{width:8px;height:7px;background:var(--cd);margin:-1px auto 0;clip-path:polygon(0 100%,50% 0,100% 100%)}
.bag-ear{position:absolute;top:-1px;width:7px;height:8px;background:var(--cm);border:2px solid var(--cd);border-bottom:none;z-index:4}
.bag-ear.l{left:10px;transform:rotate(-10deg)}.bag-ear.r{right:10px;transform:rotate(10deg)}

/* ===== PLASTIC BAG — thin, knotted top, crinkly, trapezoid ===== */
.ct-b.plastic_bag{
  border:1.5px solid var(--cd);
  background:linear-gradient(165deg,var(--cl) 0%,var(--cm) 55%,var(--cd) 100%);
  clip-path:polygon(8% 0,92% 0,100% 100%,0 100%);
  overflow:visible;
}
.pbag-shine{position:absolute;left:22%;top:10%;bottom:10%;width:3px;background:linear-gradient(180deg,transparent 0%,#ffffff88 30%,#ffffffbb 50%,#ffffff88 70%,transparent 100%);z-index:1}
.pbag-wr{position:absolute;left:8%;right:8%;height:1px;opacity:.35}
.pbag-knot{position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:4;width:24px;height:10px}
.pbag-ear{position:absolute;top:0;width:9px;height:7px;background:var(--cm);border:1.5px solid var(--cd)}
.pbag-ear.el{left:0;transform:rotate(-15deg);transform-origin:bottom right}
.pbag-ear.er{right:0;transform:rotate(15deg);transform-origin:bottom left}
.pbag-neck{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:6px;height:5px;background:var(--cd)}
.pbag-trans{position:absolute;inset:0;background:repeating-linear-gradient(4deg,transparent,transparent 7px,#ffffff18 7px,#ffffff18 8px);pointer-events:none;clip-path:polygon(8% 0,92% 0,100% 100%,0 100%)}

/* ===== PLASTIC BIN ===== */
.ct-b.plastic_bin{border:2px solid var(--cd);background:linear-gradient(180deg,var(--cl),var(--cm) 35%,var(--cd))}
.bin-h{position:absolute;top:-3px;width:14%;height:5px;background:var(--cd);z-index:2;border-radius:1px 1px 0 0}
.bin-h.hl{left:18%}.bin-h.hr{right:18%}
.bin-rim{position:absolute;top:0;left:0;right:0;height:6px;background:var(--cl);border-bottom:2px solid var(--cd)}
.bin-lbl{position:absolute;top:13px;left:4px;right:4px;height:9px;background:#ffffff22;border:1px solid #ffffff18}

/* ===== TRANSPARENT BOX ===== */
.ct-b.transparent_box{border:2px solid #8aacbc;background:linear-gradient(180deg,#d8eaf266,#b0d0e033)}
.box-h{position:absolute;top:-3px;width:16%;height:6px;background:#444;z-index:2}
.box-h.hl{left:16%}.box-h.hr{right:16%}
.box-lid{position:absolute;top:0;left:0;right:0;height:4px;background:#c4dce8;border-bottom:1px dashed #8aacbc66}
.box-grid{position:absolute;top:7px;left:3px;right:3px;bottom:3px;background:repeating-linear-gradient(45deg,transparent,transparent 5px,#80b0cc0a 5px,#80b0cc0a 6px)}

/* ===== INSTRUMENT ===== */
.ct-b.instrument{border:2px solid #666;background:linear-gradient(180deg,#555,#333)}
.inst-s{position:absolute;top:6px;left:5px;right:5px;height:18px;background:#0a2a0a;border:1px solid #666;display:flex;align-items:center;justify-content:center}
.inst-t{color:#0c0;font-size:8px;font-family:monospace;letter-spacing:1px}
.inst-kb{position:absolute;bottom:5px;left:5px;display:flex;gap:3px}
.inst-k{width:5px;height:5px;background:#777}.inst-k.r{background:#944}

/* Paper / cardboard — corrugated box with flaps */
.ct-b.paper_bag{border:2px solid var(--cd);background:linear-gradient(180deg,var(--cl),var(--cm))}
.pb-fold{position:absolute;top:0;left:4px;right:4px;height:8px;background:var(--cl);clip-path:polygon(0 100%,0 40%,15% 0,85% 0,100% 40%,100% 100%)}
.ct-b.cardboard{
  border:2px solid var(--cd);background:var(--cm);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 4px,var(--cd) 4px,var(--cd) 5px);
}
.cb-flap{position:absolute;top:0;height:8px;background:var(--cl);border:1.5px solid var(--cd);border-top:none}
.cb-flap.l{left:0;width:44%;border-left:none}
.cb-flap.r{right:0;width:44%;border-right:none}
.cb-tape{position:absolute;top:0;left:30%;right:30%;height:10px;background:var(--cd);opacity:.4}

.add-b{width:26px;height:26px;background:var(--sf);border:2px dashed var(--bd);color:var(--mt);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:center;border-radius:6px;transition:all .15s;box-shadow:0 1px 3px #0001}
.add-b:hover{border-color:var(--acc);color:var(--acc);box-shadow:0 2px 6px #0002}

/* Panel */
.pn{width:360px;min-width:320px;background:var(--sf);border-left:2px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.tb{display:flex;border-bottom:2px solid var(--bd);background:var(--sf2)}
.tbtn{flex:1;padding:9px 4px;background:none;border:none;color:var(--mt);font-size:14px;cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tbtn.on{color:var(--acc);border-bottom-color:var(--acc);background:#fff}
.pb{flex:1;overflow:auto;padding:12px 16px}
.ic{animation:fadeIn .2s ease}
.ic-n{font-size:18px;font-weight:bold;margin-bottom:2px;color:#1a1e2c}
.ic-m{font-size:12px;color:var(--mt);margin-bottom:10px}
.ir{display:flex;padding:6px 0;border-bottom:1px solid #eef0f4}
.ir-k{flex:0 0 82px;font-size:13px;color:var(--mt)}
.ir-v{flex:1;font-size:14px;color:#1a1e2c;word-break:break-all}
.ia{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.ec{animation:fadeIn .2s ease}
.ec-t{font-size:16px;font-weight:bold;margin-bottom:10px;color:var(--acc)}
.fd{margin-bottom:7px}
.fd label{display:block;font-size:11px;color:var(--mt);margin-bottom:2px;font-weight:bold;letter-spacing:.3px}
.fd input,.fd select,.fd textarea{width:100%;padding:6px 8px;background:var(--sf2);border:2px solid var(--bd);color:var(--txt);font-size:14px;outline:none;border-radius:6px;transition:border-color .15s}
.fd input:focus,.fd textarea:focus{border-color:var(--acc)}
.fd textarea{min-height:36px;resize:vertical}
.cr{display:flex;gap:4px;flex-wrap:wrap}
.cs{width:26px;height:26px;cursor:pointer;border:2px solid #ccc;border-radius:6px;box-shadow:0 1px 2px #0001}.cs.on{border-color:var(--acc);box-shadow:0 0 0 2px #2a6ab044}
.szr{display:flex;gap:4px}
.szb{padding:4px 10px;background:var(--sf2);border:2px solid var(--bd);color:var(--mt);font-size:13px;cursor:pointer;border-radius:6px;box-shadow:0 1px 2px #0001;transition:all .15s}
.szb.on{border-color:var(--acc);color:var(--acc);background:#e8f0fa;box-shadow:0 1px 4px #2a6ab022}
.stk-ctrl{margin-top:12px;padding-top:10px;border-top:2px solid #eef0f4}
.stk-ctrl-t{font-size:12px;color:var(--mt);margin-bottom:5px;font-weight:bold}
.stk-info{font-size:13px;margin-bottom:5px;color:#556}
.li{display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px;border-left:3px solid var(--grn);font-size:13px;margin-bottom:3px;align-items:center;background:#f8faf8;border-radius:6px}
.li-t{color:var(--grn);font-size:11px}.li-a{color:var(--acc);font-weight:bold}.li-d{color:#667;flex:1}
.btn{padding:6px 14px;border:2px solid;font-size:13px;cursor:pointer;transition:all .15s;border-radius:8px;font-weight:500;box-shadow:0 1px 4px #0001}
.btn:hover{filter:brightness(1.05);box-shadow:0 2px 6px #0002;transform:translateY(-1px)}
.bp{background:#e8f8ee;border-color:#4aaa6a;color:#1a7a3a}
.bdn{background:#fce8e8;border-color:#d06060;color:#a03030}
.bg{background:var(--sf);border-color:var(--bd);color:#556}
.bgl{background:#faf0e0;border-color:#d0a040;color:#8a6a10}
.bor{background:#e8f0fa;border-color:#6aaad4;color:#2a6ab0}
.empty{color:var(--mt);text-align:center;padding:24px 10px;font-size:14px;line-height:1.9}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#e8f8ee;color:#1a7a3a;padding:7px 20px;border:2px solid #4aaa6a;font-size:14px;z-index:999;animation:toastIn .2s ease;border-radius:10px;box-shadow:0 4px 12px #0002}
.ftr{padding:5px 16px;background:var(--sf);border-top:1px solid var(--bd);font-size:11px;color:var(--mt);text-align:center}
.lv-c.dov{outline:2px dashed var(--acc);outline-offset:2px}
.hide-labels .ct-lb{display:none}
.tooltip{position:fixed;background:var(--sf);border:2px solid var(--bd);border-radius:10px;padding:10px 14px;box-shadow:0 4px 16px #0003;z-index:200;pointer-events:none;max-width:280px;font-size:13px;line-height:1.6;animation:fadeIn .15s ease}
.tooltip .tt-n{font-size:15px;font-weight:bold;margin-bottom:4px}
.tooltip .tt-m{font-size:11px;color:var(--mt);margin-bottom:6px}
.tooltip .tt-r{display:flex;gap:4px}
.tooltip .tt-k{color:var(--mt);font-size:11px;min-width:50px}
.tooltip .tt-v{font-size:13px}
.stkmode .ct:not(.sel){cursor:crosshair !important;outline:2px dashed #6aaad444}
.stkmode .ct:not(.sel):hover{outline-color:var(--acc)}
@media(max-width:768px){
  body{font-size:14px}
  .hdr{flex-wrap:wrap;gap:4px;padding:5px 8px}
  .hdr-t{font-size:16px}
  .hdr-r{width:100%;display:flex;flex-wrap:wrap;gap:3px}
  .hdr-r .btn{padding:4px 6px;font-size:10px;flex:1;min-width:0;text-align:center}
  .sbar{flex-wrap:wrap;gap:4px;padding:4px 8px}
  .sbar-w{width:100%;min-width:0}
  #si{font-size:13px;padding:6px 8px}
  .fsel{font-size:11px;flex:1;min-width:0;padding:4px 4px}
  .main{flex-direction:column}
  .sa{padding:4px 4px}
  .sf{min-width:0;width:100%;display:block;border-radius:4px;padding:1px 3px}
  .st{flex-wrap:wrap;gap:4px;font-size:13px;margin-bottom:4px}
  .st .btn{padding:3px 8px;font-size:11px}
  .lv{padding:3px 4px}
  .lv-l{font-size:10px;margin-bottom:2px}
  .lv-c{gap:1px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .ct{transform:scale(0.76);transform-origin:bottom left;margin:-3px -3px}
  .ct-lb{font-size:9px}
  .sb{height:3px}
  .pn{width:100%;max-height:45vh;border-left:none;border-top:2px solid var(--bd);min-width:0}
  .pb{padding:8px 10px}
  .tbtn{font-size:12px;padding:7px 2px}
  .tooltip{max-width:200px;font-size:11px;padding:8px 10px}
  .tooltip .tt-n{font-size:13px}
  .ic-n{font-size:15px}
  .ir-k{flex:0 0 60px;font-size:11px}
  .ir-v{font-size:12px}
  .fd input,.fd select,.fd textarea{font-size:13px;padding:6px}
  .btn{padding:6px 10px;font-size:12px}
  .empty{font-size:12px;padding:12px 6px}
  .add-b{width:20px;height:20px;font-size:12px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TYPES={
  woven_bag:{l:'编织袋',cs:['#6b7f5a','#7a8e6a','#5c6e4c','#8a9a7a','#9aaa8a','#5a7048','#aab89a','#c8c090','#d8d8d0','#e8e6e0']},
  plastic_bag:{l:'塑料袋',cs:['#d0d4dc','#b0b4c0','#c4ccd8','#8a8e9a','#e4e4ea','#a0aab4','#dde0e6']},
  plastic_bin:{l:'收纳筐',cs:['#9a5ab0','#a0c040','#70b8d8','#4a9a8a','#d08050','#d0d0d0','#a8cce0','#b8d8ea','#90b8d0']},
  cardboard:{l:'纸箱',cs:['#b8956a','#a88558','#c8a860','#b89850','#d8b870']},
  instrument:{l:'仪器',cs:['#3a3a4a','#2a2a3a']}
};
const SZ={xs:{w:42,h:44},s:{w:52,h:50},m:{w:64,h:56},l:{w:82,h:62},xl:{w:98,h:68}};
const SK=['xs','s','m','l','xl'],SL={xs:'迷你',s:'小',m:'中',l:'大',xl:'加大'};
const STATS=['在库','已取出','已用完','待处理'],SRCS=['课题组样地','其他样地','非土样',''];
const mid=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const TS=()=>new Date().toLocaleString('zh-CN');
function dk(h,n=35){try{let c=h.replace('#','');if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];const v=parseInt(c,16);return'#'+[16,8,0].map(s=>Math.max(0,((v>>s)&0xff)-n).toString(16).padStart(2,'0')).join('')}catch{return'#666'}}
function lt(h,n=25){try{let c=h.replace('#','');if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];const v=parseInt(c,16);return'#'+[16,8,0].map(s=>Math.min(255,((v>>s)&0xff)+n).toString(16).padStart(2,'0')).join('')}catch{return'#ddd'}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ===== INITIAL DATA =====
const INIT={id:'shelf1',name:'架3',levels:[
  {id:'L1',label:'第一层（顶层）',containers:[
    {id:'r1c1',type:'plastic_bin',vis:'transparent_box',color:'#a8cce0',size:'l',label:'DCS',source:'',location:'',coordinates:'',amendment:'',amendmentAmount:'',treatment:'DCS',samplingDepth:'',amendmentDate:'',samplingDate:'',person:'',samples:'袋装土样',notes:'',status:'在库',stackParent:null},
    {id:'r1c2',type:'plastic_bin',vis:'transparent_box',color:'#a8cce0',size:'l',label:'HLF',source:'',location:'',coordinates:'',amendment:'',amendmentAmount:'',treatment:'HLF',samplingDepth:'',amendmentDate:'',samplingDate:'',person:'',samples:'袋装土样',notes:'',status:'在库',stackParent:null},
    {id:'r1c3',type:'plastic_bin',vis:'transparent_box',color:'#b8d8ea',size:'l',label:'1-3',source:'',location:'',coordinates:'',amendment:'',amendmentAmount:'',treatment:'',samplingDepth:'',amendmentDate:'',samplingDate:'',person:'',samples:'',notes:'',status:'在库',stackParent:null},
    {id:'r1c4',type:'plastic_bin',vis:'transparent_box',color:'#a8cce0',size:'l',label:'1-4',source:'',location:'',coordinates:'',amendment:'',amendmentAmount:'',treatment:'',samplingDepth:'',amendmentDate:'',samplingDate:'',person:'',samples:'',notes:'',status:'在库',stackParent:null},
    {id:'r1c5',type:'plastic_bin',color:'#4a9a8a',size:'m',label:'九三垦区',source:'',location:'九三垦区',coordinates:'',amendment:'',amendmentAmount:'',treatment:'',samplingDepth:'',amendmentDate:'',samplingDate:'',person:'',samples:'',notes:'青绿色收纳筐',status:'在库',stackParent:null},
  ]},

        const under=document.elementFromPoint(touch.clientX,touch.clientY);
        const targetLv=under?.closest('.lv-c');

      }
    },{passive:false});
    document.addEventListener('touchend',e=>{
      if(!touchDrag)return;

        touchDrag.ghost.remove();
        touchDrag.el.style.opacity='';
        document.querySelectorAll('.lv-c').forEach(lc=>{lc.style.outline='none'});
        // Find drop target
        const touch=e.changedTouches[0];
        const under=document.elementFromPoint(touch.clientX,touch.clientY);
        const targetLv=under?.closest('.lv-c');
        const targetCt=under?.closest('.ct');
        if(targetLv){
          const toLvId=targetLv.dataset.lv;
          const fl=S.shelf.levels.find(l=>l.id===touchDrag.lvid);
          const tl=S.shelf.levels.find(l=>l.id===toLvId);
          if(fl&&tl){
            const ci=fl.containers.findIndex(x=>x.id===touchDrag.cid);
            if(ci>=0){
              const[item]=fl.containers.splice(ci,1);
              if(touchDrag.lvid!==toLvId){item.stackParent=null;fl.containers.forEach(x=>{if(x.stackParent===item.id)x.stackParent=null})}
              if(targetCt&&targetCt.dataset.cid!==touchDrag.cid){
                const ti=tl.containers.findIndex(x=>x.id===targetCt.dataset.cid);
                tl.containers.splice(ti>=0?ti:tl.containers.length,0,item);
              }else{tl.containers.push(item)}
              commit('移动',item.label+' → '+tl.label);
            }
          }
        }
      }
      touchDrag=null;render();
    },{passive:false});
    // Dismiss tooltip on background tap
    document.addEventListener('touchstart',e=>{
      if(!e.target.closest('.ct'))document.getElementById('tooltip').style.display='none';
    },{passive:true});
  }
}

  if(!S.moveSrc){S.moveSrc={cid,lvid};S.sel=cid;toast('已选中，点击目标层放置');render();return}

const GH_TOKEN=atob('Z2l0aHViX3BhdF8xMUJSTEFXQ1kwSnFtZjZBRkNveks3'+'X29VY3VaZFRrVmdiN3gwcVFaYWpuUlpZYkxSajIyUzNy'+'UEtzeUpxVnVHUmo0WTNGTkhRT2Rqc1BHTFFt');
let fileSha='',cloudBusy=false;

function toB64(str){return btoa(unescape(encodeURIComponent(str)))}
function fromB64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))))}

async function cloudPull(){
  if(cloudBusy||!GH_TOKEN)return false;cloudBusy=true;
  try{
    const r=await fetch(GH_API,{headers:{'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','If-None-Match':''}});
    if(r.status===404){cloudBusy=false;return false}
    if(!r.ok){cloudBusy=false;return false}
    const d=await r.json();fileSha=d.sha;
    const content=JSON.parse(fromB64(d.content));
    if(content.shelves&&content.shelves.length>0){
      S.shelves=content.shelves;if(content.log)S.log=content.log;save();
      cloudBusy=false;return true;
    }
    cloudBusy=false;return false;
  }catch(e){console.warn('pull',e);cloudBusy=false;return false}
}

async function cloudPush(){
  if(cloudBusy||!GH_TOKEN)return false;cloudBusy=true;
  try{
    const json=JSON.stringify({shelves:S.shelves,log:S.log,ts:TS()});
    const body={message:'sync '+TS(),content:toB64(json)};
    if(fileSha)body.sha=fileSha;
    const r=await fetch(GH_API,{method:'PUT',headers:{'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const d=await r.json();fileSha=d.content.sha;cloudBusy=false;return true}
    else{const e=await r.text();console.warn('push fail',r.status,e);cloudBusy=false;return false}
  }catch(e){console.warn('push',e);cloudBusy=false;return false}
}

// 数据策略：GitHub为主，localStorage为备份
(async function(){
  // 1. 尝试从GitHub拉取
  const ok=await cloudPull();
  if(ok){
    render();
    lastSaved=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    toast('☁ 数据已加载');
    return;
  }
  // 2. GitHub失败 → 用localStorage缓存（离线备份）
  if(S.shelves&&S.shelves.length>0&&S.shelves.some(sh=>sh.levels.some(l=>l.containers.length>0))){
    render();toast('⚠ 离线模式，使用本地缓存');return;
  }
  // 3. 都没有 → 用初始数据，推送到GitHub
  S.shelves=[JSON.parse(JSON.stringify(INIT3)),JSON.parse(JSON.stringify(INIT4)),JSON.parse(JSON.stringify(INIT)),JSON.parse(JSON.stringify(INIT2))];
  save();render();
  const pushed=await cloudPush();
  toast(pushed?'☁ 初始数据已上传':'⚠ 使用本地数据');
})();

window.importD=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.shelves){S.shelves=d.shelves;S.shelfIdx=0;if(d.log)S.log=d.log;if(d.hist)S.hist=d.hist;save();render();toast('已导入')}else if(d.shelf){S.shelves=[d.shelf];S.shelfIdx=0;save();render();toast('已导入(旧格式)')}else toast('格式错误')}catch{toast('解析失败')}};r.readAsText(f)};inp.click()};
